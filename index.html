<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>어글리 그리너리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="logo">🥕 어글리 그리너리</div>
  <div class="header-right">
    <div id="userInfo"></div>
    <button id="loginBtn" class="btn">Google 로그인</button>
    <button
  onclick="location.href='cart.html'"
  class="btn">
  🛒 장바구니
</button>
    <button id="logoutBtn" class="btn hidden">로그아웃</button>
  </div>
  <div class="header-right">
  <div id="userInfo"></div>

  <button
    class="btn"
    onclick="location.href='admin.html'">
    ➕ 상품추가
  </button>
  <button id="logoutBtn" class="btn hidden">
    로그아웃
  </button>
</div>
</header>

<section class="hero">
  <h1>외모는 달라도 맛과 영양은 그대로!</h1>
  <p>버려질 위기의 못난이 농산물을 구해주세요.</p>
  <div class="badge" id="totalWeight">🌱 구출 농산물 불러오는 중...</div>
</section>

<section class="section">
  <h2 class="section-title">AI 농산물 검색</h2>

  <div class="ai-box">
    <input id="searchInput" placeholder="예: 감자 있나요? 사과 가격 비교해줘" />
    <button id="aiSearchBtn" class="btn">AI 검색</button>
    <button id="ttsBtn" class="btn">
      🔊 읽어주기
    </button>
  </div>
  

  <div id="aiResult" class="ai-result"></div>
</section>

<section class="section">
  <h2 class="section-title">오늘의 못난이 농산물</h2>
  <div class="product-grid" id="productList">
    <p>상품 불러오는 중...</p>
  </div>
</section>

<footer>
  © 2026 Ugly Greenery
</footer>

<script type="module" src="app.js"></script>
</body>
</html>
